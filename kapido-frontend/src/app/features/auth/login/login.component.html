<div class="kap-login-bg">

  <div class="kap-login-card">

    <!-- Brand -->
    <div class="kap-login-brand">
      <div class="kap-login-brand-name">
        <span class="kap-k">K</span><span class="kap-text">apido</span>
      </div>
      <div class="kap-login-subtitle">Sistema de gestión de productos</div>
    </div>

    <!-- Formulario -->
    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="kap-login-form">

      <div class="kap-field">
        <label for="email" class="kap-label">Correo electrónico</label>
        <input
          type="email"
          id="email"
          name="email"
          class="kap-input"
          [(ngModel)]="email"
          placeholder="usuario@kapido.com"
          required
          autocomplete="email">
      </div>

      <div class="kap-field">
        <label for="password" class="kap-label">Contraseña</label>
        <input
          type="password"
          id="password"
          name="password"
          class="kap-input"
          [(ngModel)]="password"
          placeholder="••••••••"
          required
          autocomplete="current-password">
      </div>

      <div *ngIf="errorMessage" class="kap-error">
        {{ errorMessage }}
      </div>

      <button type="submit" class="kap-btn-submit" [disabled]="cargando">
        <span *ngIf="cargando" class="kap-btn-loading">
          <span class="kap-dot"></span>
          <span class="kap-dot"></span>
          <span class="kap-dot"></span>
        </span>
        <span *ngIf="!cargando">Entrar</span>
      </button>

    </form>

    <button type="button" class="kap-btn-back" (click)="volverAlSelector()">
      ← Volver
    </button>

  </div>

</div>
