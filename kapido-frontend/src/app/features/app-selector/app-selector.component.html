<div class="kap-selector-bg">

  <div class="kap-selector-inner">

    <!-- Brand -->
    <div class="kap-selector-brand">
      <div class="kap-brand-name">
        <span class="kap-k">K</span><span class="kap-text">apido</span>
      </div>
      <div class="kap-brand-subtitle">Selecciona la aplicación a la que quieres acceder</div>
    </div>

    <!-- Cards -->
    <div class="kap-cards">

      <!-- Card 1: K-Expiration Control -->
      <button class="kap-card kap-card--active" (click)="goToKExpiration()">
        <div class="kap-card-icon">⏱️</div>
        <div class="kap-card-title">K-Expiration Control</div>
        <div class="kap-card-desc">Gestión de caducidades, stock y productos del establecimiento.</div>
        <div class="kap-card-arrow">→</div>
      </button>

      <!-- Card 2: Próximamente -->
      <div class="kap-card kap-card--soon">
        <div class="kap-card-icon">📦</div>
        <div class="kap-card-title">K-Inventory</div>
        <div class="kap-card-desc">Control de inventario y gestión de almacén.</div>
        <div class="kap-card-badge">Próximamente</div>
      </div>

      <!-- Card 3: Próximamente -->
      <div class="kap-card kap-card--soon">
        <div class="kap-card-icon">📊</div>
        <div class="kap-card-title">K-Analytics</div>
        <div class="kap-card-desc">Informes y análisis avanzados de negocio.</div>
        <div class="kap-card-badge">Próximamente</div>
      </div>

    </div>

  </div>

</div>
