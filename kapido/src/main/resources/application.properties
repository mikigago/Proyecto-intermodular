spring.application.name=kapido

# Servidor — Railway inyecta PORT automáticamente
server.port=${PORT:8080}

# Configuración MySQL — variables de Railway (MYSQLHOST, MYSQLPORT, etc.)
spring.datasource.url=jdbc:mysql://${MYSQLHOST:localhost}:${MYSQLPORT:3306}/${MYSQLDATABASE:kapido}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# JWT — usar variable de entorno en producción
jwt.secret=${JWT_SECRET:kapido-jwt-secret-key-2026-proyecto-intermodular-muy-largo}
jwt.expiration=${JWT_EXPIRATION:86400000}

# CORS — origen permitido (URL del frontend en Railway)
cors.origin=${CORS_ORIGIN:http://localhost:4200}
