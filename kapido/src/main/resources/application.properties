spring.application.name=kapido

# Servidor
server.port=8080

# Configuración MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/kapido?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — clave secreta (mínimo 32 caracteres) y expiración en 24h
jwt.secret=kapido-jwt-secret-key-2026-proyecto-intermodular-muy-largo
jwt.expiration=86400000
