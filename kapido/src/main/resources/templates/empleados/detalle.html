<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle del Empleado</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/empleados">
                <i class="bi bi-briefcase-fill"></i> Kapido
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
                        <h3 class="mb-0">
                            <i class="bi bi-person-badge"></i> Detalle del Empleado
                        </h3>
                        <a href="/empleados" class="btn btn-light btn-sm">
                            <i class="bi bi-arrow-left"></i> Volver
                        </a>
                    </div>
                    <div class="card-body">
                        <div class="row">
                            <div class="col-md-12">
                                <!-- ID -->
                                <div class="mb-3 row">
                                    <label class="col-sm-3 col-form-label fw-bold">
                                        <i class="bi bi-hash"></i> ID:
                                    </label>
                                    <div class="col-sm-9">
                                        <p class="form-control-plaintext" th:text="${empleado.id}"></p>
                                    </div>
                                </div>

                                <!-- Nombre -->
                                <div class="mb-3 row">
                                    <label class="col-sm-3 col-form-label fw-bold">
                                        <i class="bi bi-person"></i> Nombre:
                                    </label>
                                    <div class="col-sm-9">
                                        <p class="form-control-plaintext" th:text="${empleado.nombre}"></p>
                                    </div>
                                </div>

                                <!-- Apellidos -->
                                <div class="mb-3 row">
                                    <label class="col-sm-3 col-form-label fw-bold">
                                        <i class="bi bi-person"></i> Apellidos:
                                    </label>
                                    <div class="col-sm-9">
                                        <p class="form-control-plaintext" th:text="${empleado.apellidos}"></p>
                                    </div>
                                </div>

                                <!-- DNI -->
                                <div class="mb-3 row">
                                    <label class="col-sm-3 col-form-label fw-bold">
                                        <i class="bi bi-card-text"></i> DNI:
                                    </label>
                                    <div class="col-sm-9">
                                        <p class="form-control-plaintext" th:text="${empleado.dni}"></p>
                                    </div>
                                </div>

                                <!-- Cargo -->
                                <div class="mb-3 row">
                                    <label class="col-sm-3 col-form-label fw-bold">
                                        <i class="bi bi-briefcase"></i> Cargo:
                                    </label>
                                    <div class="col-sm-9">
                                        <p class="form-control-plaintext">
                                            <span class="badge bg-info fs-6" th:text="${empleado.cargo}"></span>
                                        </p>
                                    </div>
                                </div>

                                <!-- Estado -->
                                <div class="mb-3 row">
                                    <label class="col-sm-3 col-form-label fw-bold">
                                        <i class="bi bi-toggle-on"></i> Estado:
                                    </label>
                                    <div class="col-sm-9">
                                        <p class="form-control-plaintext">
                                            <span th:if="${empleado.activo}" class="badge bg-success fs-6">
                                                <i class="bi bi-check-circle"></i> Activo
                                            </span>
                                            <span th:unless="${empleado.activo}" class="badge bg-secondary fs-6">
                                                <i class="bi bi-x-circle"></i> Inactivo
                                            </span>
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- Botones de acción -->
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a th:href="@{/empleados/editar/{id}(id=${empleado.id})}" class="btn btn-warning">
                                <i class="bi bi-pencil"></i> Editar
                            </a>
                            <button type="button" class="btn btn-danger" data-bs-toggle="modal" data-bs-target="#deleteModal">
                                <i class="bi bi-trash"></i> Eliminar
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal de confirmación de eliminación -->
    <div class="modal fade" id="deleteModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Confirmar eliminación</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    ¿Está seguro que desea eliminar al empleado 
                    <strong th:text="${empleado.nombre + ' ' + empleado.apellidos}"></strong>?
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <form th:action="@{/empleados/eliminar/{id}(id=${empleado.id})}" method="post" style="display: inline;">
                        <button type="submit" class="btn btn-danger">Eliminar</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
