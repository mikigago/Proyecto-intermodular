<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${empleado.id != null ? 'Editar Empleado' : 'Nuevo Empleado'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="/empleados">
                <i class="bi bi-briefcase-fill"></i> Kapido
            </a>
        </div>
    </nav>

    <div class="container mt-4">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">
                            <i th:class="${empleado.id != null ? 'bi bi-pencil-square' : 'bi bi-person-plus'}"></i>
                            <span th:text="${empleado.id != null ? 'Editar Empleado' : 'Nuevo Empleado'}"></span>
                        </h3>
                    </div>
                    <div class="card-body">
                        <form th:action="${empleado.id != null ? '/empleados/editar/' + empleado.id : '/empleados/nuevo'}" 
                              th:object="${empleado}" 
                              method="post">
                            
                            <!-- Campo oculto para ID -->
                            <input type="hidden" th:field="*{id}">

                            <!-- Nombre -->
                            <div class="mb-3">
                                <label for="nombre" class="form-label">
                                    <i class="bi bi-person"></i> Nombre *
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       th:class="${#fields.hasErrors('nombre')} ? 'form-control is-invalid' : 'form-control'"
                                       id="nombre" 
                                       th:field="*{nombre}" 
                                       placeholder="Ingrese el nombre">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('nombre')}" th:errors="*{nombre}"></div>
                            </div>

                            <!-- Apellidos -->
                            <div class="mb-3">
                                <label for="apellidos" class="form-label">
                                    <i class="bi bi-person"></i> Apellidos *
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       th:class="${#fields.hasErrors('apellidos')} ? 'form-control is-invalid' : 'form-control'"
                                       id="apellidos" 
                                       th:field="*{apellidos}" 
                                       placeholder="Ingrese los apellidos">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('apellidos')}" th:errors="*{apellidos}"></div>
                            </div>

                            <!-- DNI -->
                            <div class="mb-3">
                                <label for="dni" class="form-label">
                                    <i class="bi bi-card-text"></i> DNI *
                                </label>
                                <input type="text" 
                                       class="form-control" 
                                       th:class="${#fields.hasErrors('dni')} ? 'form-control is-invalid' : 'form-control'"
                                       id="dni" 
                                       th:field="*{dni}" 
                                       placeholder="Ej: 12345678A">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('dni')}" th:errors="*{dni}"></div>
                            </div>

                            <!-- Cargo -->
                            <div class="mb-3">
                                <label for="cargo" class="form-label">
                                    <i class="bi bi-briefcase"></i> Cargo *
                                </label>
                                <select class="form-select" 
                                        th:class="${#fields.hasErrors('cargo')} ? 'form-select is-invalid' : 'form-select'"
                                        id="cargo" 
                                        th:field="*{cargo}">
                                    <option value="">Seleccione un cargo</option>
                                    <option th:each="cargo : ${cargos}" 
                                            th:value="${cargo}" 
                                            th:text="${cargo}"></option>
                                </select>
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('cargo')}" th:errors="*{cargo}"></div>
                            </div>

                            <!-- Estado Activo -->
                            <div class="mb-3 form-check">
                                <input type="checkbox" 
                                       class="form-check-input" 
                                       id="activo" 
                                       th:field="*{activo}">
                                <label class="form-check-label" for="activo">
                                    <i class="bi bi-check-circle"></i> Empleado activo
                                </label>
                            </div>

                            <!-- Botones -->
                            <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                                <a href="/empleados" class="btn btn-secondary">
                                    <i class="bi bi-x-circle"></i> Cancelar
                                </a>
                                <button type="submit" class="btn btn-primary">
                                    <i class="bi bi-save"></i> Guardar
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
